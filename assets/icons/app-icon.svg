<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Industrial HMI Icon -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3584e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5fb4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" />
  
  <!-- Factory/Industrial symbol -->
  <rect x="30" y="50" width="20" height="40" fill="white" opacity="0.9"/>
  <rect x="54" y="40" width="20" height="50" fill="white" opacity="0.9"/>
  <rect x="78" y="45" width="20" height="45" fill="white" opacity="0.9"/>
  
  <!-- Gear/Settings overlay -->
  <circle cx="64" cy="35" r="10" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
  <circle cx="64" cy="35" r="5" fill="white" opacity="0.8"/>
  
  <!-- Bottom bar -->
  <rect x="25" y="90" width="78" height="6" fill="white" opacity="0.9"/>
