<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (light gray) -->
  <circle cx="100" cy="100" r="85" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Outer gauge ring (empty) -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#E0E0E0" stroke-width="12"/>
  
  <!-- No gauge fill - offline -->
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="55" fill="white" stroke="#9E9E9E" stroke-width="2"/>
  
  <!-- Offline icon (power symbol) -->
  <circle cx="100" cy="95" r="15" fill="none" stroke="#9E9E9E" stroke-width="3" 
          stroke-dasharray="0 47 47 0"/>
  <line x1="100" y1="80" x2="100" y2="95" stroke="#9E9E9E" stroke-width="3"/>
  
  <!-- Label text -->
  <text x="100" y="125" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="12" fill="#757575">
    OFFLINE
  </text>
  
  <!-- Status indicator dots (top) - all gray -->
  <circle cx="100" cy="20" r="6" fill="#BDBDBD"/>
  <circle cx="85" cy="25" r="4" fill="#BDBDBD" opacity="0.5"/>
  <circle cx="115" cy="25" r="4" fill="#BDBDBD" opacity="0.5"/>
  
  <!-- Disconnected symbol (broken line) -->
  <line x1="50" y1="165" x2="90" y2="165" stroke="#BDBDBD" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="165" x2="150" y2="165" stroke="#BDBDBD" stroke-width="3" stroke-linecap="round"/>
  <circle cx="95" cy="165" r="3" fill="#BDBDBD"/>
  <circle cx="105" cy="165" r="3" fill="#BDBDBD"/>
  
  <!-- Text label -->
  <text x="100" y="185" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="10" fill="#9E9E9E">
    Not Connected
  </text>
</svg>
