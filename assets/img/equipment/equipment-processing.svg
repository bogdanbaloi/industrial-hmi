<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (light orange) -->
  <circle cx="100" cy="100" r="85" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  
  <!-- Outer gauge ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#E0E0E0" stroke-width="12"/>
  
  <!-- Gauge fill (60% orange arc - processing) -->
  <circle cx="100" cy="100" r="70" fill="none" 
          stroke="#FF9800" stroke-width="12"
          stroke-dasharray="264 440"
          stroke-dashoffset="0"
          transform="rotate(-90 100 100)"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="55" fill="white" stroke="#FF9800" stroke-width="2"/>
  
  <!-- Percentage text -->
  <text x="100" y="95" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#E65100">
    60%
  </text>
  
  <!-- Label text -->
  <text x="100" y="115" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="12" fill="#757575">
    WORK
  </text>
  
  <!-- Rotating gear indicator (suggests processing) -->
  <g transform="translate(100, 100)">
    <!-- Small gear teeth -->
    <path d="M 0,-8 L 3,-12 L -3,-12 Z" fill="#FF9800"/>
    <path d="M 8,0 L 12,3 L 12,-3 Z" fill="#FF9800"/>
    <path d="M 0,8 L 3,12 L -3,12 Z" fill="#FF9800"/>
    <path d="M -8,0 L -12,3 L -12,-3 Z" fill="#FF9800"/>
  </g>
  
  <!-- Status indicator dots (top) - blinking pattern suggested -->
  <circle cx="100" cy="20" r="6" fill="#FF9800"/>
  <circle cx="85" cy="25" r="4" fill="#FF9800" opacity="0.4"/>
  <circle cx="115" cy="25" r="4" fill="#FF9800" opacity="0.8"/>
  
  <!-- Progress bars (bottom) -->
  <rect x="50" y="165" width="100" height="4" fill="#E0E0E0" rx="2"/>
  <rect x="50" y="165" width="60" height="4" fill="#FF9800" rx="2"/>
</svg>
