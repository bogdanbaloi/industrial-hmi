<svg width="240" height="240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="240" height="240" fill="#E3F2FD" rx="8"/>
  
  <!-- Title bar -->
  <rect width="240" height="35" fill="#2196F3" rx="8"/>
  <text x="120" y="23" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    ACTUATOR SYSTEM
  </text>
  
  <!-- Coordinate system -->
  <g transform="translate(120, 130)">
    <!-- Axes -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#90A4AE" stroke-width="2"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#90A4AE" stroke-width="2"/>
    
    <!-- Arrow heads -->
    <path d="M 60 0 L 55 -3 L 55 3 Z" fill="#90A4AE"/>
    <path d="M 0 -60 L -3 -55 L 3 -55 Z" fill="#90A4AE"/>
    
    <!-- Axis labels -->
    <text x="65" y="5" font-family="Arial, sans-serif" font-size="12" fill="#546E7A">X</text>
    <text x="5" y="-65" font-family="Arial, sans-serif" font-size="12" fill="#546E7A">Y</text>
    
    <!-- Grid lines (subtle) -->
    <line x1="-60" y1="-30" x2="60" y2="-30" stroke="#CFD8DC" stroke-width="1" opacity="0.5"/>
    <line x1="-60" y1="30" x2="60" y2="30" stroke="#CFD8DC" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="-60" x2="-30" y2="60" stroke="#CFD8DC" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="-60" x2="30" y2="60" stroke="#CFD8DC" stroke-width="1" opacity="0.5"/>
    
    <!-- Current position marker -->
    <circle cx="20" cy="-25" r="8" fill="#2196F3" stroke="white" stroke-width="2"/>
    <circle cx="20" cy="-25" r="3" fill="white"/>
    
    <!-- Movement path (dotted line from origin) -->
    <line x1="0" y1="0" x2="20" y2="-25" stroke="#2196F3" stroke-width="2" 
          stroke-dasharray="3,3" opacity="0.5"/>
  </g>
  
  <!-- Position display -->
  <rect x="20" y="200" width="200" height="25" fill="white" stroke="#2196F3" stroke-width="1" rx="4"/>
  <text x="30" y="217" font-family="Arial, sans-serif" font-size="12" fill="#263238">
    Position: X:150 Y:200
  </text>
  
  <!-- Status indicator (top right) -->
  <circle cx="220" cy="20" r="8" fill="#4CAF50"/>
  <text x="190" y="24" font-family="Arial, sans-serif" font-size="10" fill="white">AUTO</text>
  
  <!-- Progress bars (left side) -->
  <g transform="translate(15, 50)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="10" fill="#546E7A">Speed</text>
    <rect x="0" y="15" width="80" height="6" fill="#E0E0E0" rx="3"/>
    <rect x="0" y="15" width="48" height="6" fill="#2196F3" rx="3"/>
    
    <text x="0" y="37" font-family="Arial, sans-serif" font-size="10" fill="#546E7A">Force</text>
    <rect x="0" y="40" width="80" height="6" fill="#E0E0E0" rx="3"/>
    <rect x="0" y="40" width="64" height="6" fill="#42A5F5" rx="3"/>
  </g>
</svg>
