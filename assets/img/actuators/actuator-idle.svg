<svg width="240" height="240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="240" height="240" fill="#E8F5E9" rx="8"/>
  
  <!-- Title bar -->
  <rect width="240" height="35" fill="#4CAF50" rx="8"/>
  <text x="120" y="23" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    ACTUATOR SYSTEM
  </text>
  
  <!-- Coordinate system -->
  <g transform="translate(120, 130)">
    <!-- Axes -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#81C784" stroke-width="2"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#81C784" stroke-width="2"/>
    
    <!-- Arrow heads -->
    <path d="M 60 0 L 55 -3 L 55 3 Z" fill="#81C784"/>
    <path d="M 0 -60 L -3 -55 L 3 -55 Z" fill="#81C784"/>
    
    <!-- Axis labels -->
    <text x="65" y="5" font-family="Arial, sans-serif" font-size="12" fill="#388E3C">X</text>
    <text x="5" y="-65" font-family="Arial, sans-serif" font-size="12" fill="#388E3C">Y</text>
    
    <!-- Grid lines -->
    <line x1="-60" y1="-30" x2="60" y2="-30" stroke="#C8E6C9" stroke-width="1" opacity="0.5"/>
    <line x1="-60" y1="30" x2="60" y2="30" stroke="#C8E6C9" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="-60" x2="-30" y2="60" stroke="#C8E6C9" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="-60" x2="30" y2="60" stroke="#C8E6C9" stroke-width="1" opacity="0.5"/>
    
    <!-- Home position marker (origin) -->
    <circle cx="0" cy="0" r="10" fill="#4CAF50" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
    
    <!-- Home icon (small house) -->
    <path d="M -6 2 L 0 -4 L 6 2 L 6 8 L -6 8 Z" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Position display -->
  <rect x="20" y="200" width="200" height="25" fill="white" stroke="#4CAF50" stroke-width="1" rx="4"/>
  <text x="30" y="217" font-family="Arial, sans-serif" font-size="12" fill="#263238">
    Position: HOME (0, 0)
  </text>
  
  <!-- Status indicator (top right) -->
  <circle cx="220" cy="20" r="8" fill="#4CAF50"/>
  <text x="190" y="24" font-family="Arial, sans-serif" font-size="10" fill="white">AUTO</text>
  
  <!-- Progress bars (left side) - all at zero/idle -->
  <g transform="translate(15, 50)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="10" fill="#546E7A">Speed</text>
    <rect x="0" y="15" width="80" height="6" fill="#E0E0E0" rx="3"/>
    <rect x="0" y="15" width="0" height="6" fill="#4CAF50" rx="3"/>
    
    <text x="0" y="37" font-family="Arial, sans-serif" font-size="10" fill="#546E7A">Force</text>
    <rect x="0" y="40" width="80" height="6" fill="#E0E0E0" rx="3"/>
    <rect x="0" y="40" width="0" height="6" fill="#66BB6A" rx="3"/>
  </g>
  
  <!-- IDLE badge -->
  <rect x="155" y="55" width="60" height="20" fill="white" stroke="#4CAF50" stroke-width="1" rx="10"/>
  <text x="185" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" 
        font-weight="bold" fill="#4CAF50">IDLE</text>
</svg>
