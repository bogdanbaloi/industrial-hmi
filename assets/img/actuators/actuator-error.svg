<svg width="240" height="240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="240" height="240" fill="#FFEBEE" rx="8"/>
  
  <!-- Title bar -->
  <rect width="240" height="35" fill="#F44336" rx="8"/>
  <text x="120" y="23" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    ACTUATOR SYSTEM
  </text>
  
  <!-- Coordinate system -->
  <g transform="translate(120, 130)">
    <!-- Axes -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#E57373" stroke-width="2"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#E57373" stroke-width="2"/>
    
    <!-- Arrow heads -->
    <path d="M 60 0 L 55 -3 L 55 3 Z" fill="#E57373"/>
    <path d="M 0 -60 L -3 -55 L 3 -55 Z" fill="#E57373"/>
    
    <!-- Axis labels -->
    <text x="65" y="5" font-family="Arial, sans-serif" font-size="12" fill="#C62828">X</text>
    <text x="5" y="-65" font-family="Arial, sans-serif" font-size="12" fill="#C62828">Y</text>
    
    <!-- Grid lines -->
    <line x1="-60" y1="-30" x2="60" y2="-30" stroke="#FFCDD2" stroke-width="1" opacity="0.5"/>
    <line x1="-60" y1="30" x2="60" y2="30" stroke="#FFCDD2" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="-60" x2="-30" y2="60" stroke="#FFCDD2" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="-60" x2="30" y2="60" stroke="#FFCDD2" stroke-width="1" opacity="0.5"/>
    
    <!-- Error position marker -->
    <circle cx="35" cy="40" r="8" fill="#F44336" stroke="white" stroke-width="2"/>
    <circle cx="35" cy="40" r="3" fill="white"/>
    
    <!-- Error cross -->
    <line x1="30" y1="35" x2="40" y2="45" stroke="white" stroke-width="2"/>
    <line x1="30" y1="45" x2="40" y2="35" stroke="white" stroke-width="2"/>
    
    <!-- Warning triangle at position -->
    <path d="M 35 25 L 30 35 L 40 35 Z" fill="none" stroke="#F44336" stroke-width="2"/>
  </g>
  
  <!-- Position display -->
  <rect x="20" y="200" width="200" height="25" fill="white" stroke="#F44336" stroke-width="1" rx="4"/>
  <text x="30" y="217" font-family="Arial, sans-serif" font-size="12" fill="#263238">
    Position: ERROR
  </text>
  
  <!-- Status indicator (top right) - error -->
  <circle cx="220" cy="20" r="8" fill="#F44336"/>
  <text x="185" y="24" font-family="Arial, sans-serif" font-size="10" fill="white">ERROR</text>
  
  <!-- Progress bars (left side) - showing fault -->
  <g transform="translate(15, 50)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="10" fill="#546E7A">Speed</text>
    <rect x="0" y="15" width="80" height="6" fill="#E0E0E0" rx="3"/>
    <rect x="0" y="15" width="20" height="6" fill="#F44336" rx="3"/>
    
    <text x="0" y="37" font-family="Arial, sans-serif" font-size="10" fill="#546E7A">Force</text>
    <rect x="0" y="40" width="80" height="6" fill="#E0E0E0" rx="3"/>
    <rect x="0" y="40" width="75" height="6" fill="#F44336" rx="3"/>
    <text x="82" y="45" font-family="Arial, sans-serif" font-size="9" fill="#F44336">!</text>
  </g>
  
  <!-- Alert badge -->
  <rect x="140" y="55" width="80" height="20" fill="white" stroke="#F44336" stroke-width="1" rx="10"/>
  <text x="180" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" 
        font-weight="bold" fill="#F44336">⚠ ALERT</text>
</svg>
