<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Quality Checkpoint Gauge - Passing (Green) -->
  <defs>
    <linearGradient id="passGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle (gray track) -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="#E0E0E0" stroke-width="8"/>
  
  <!-- Progress arc (98% fill - excellent) -->
  <circle cx="40" cy="40" r="30" fill="none" 
          stroke="url(#passGradient)" 
          stroke-width="8"
          stroke-dasharray="188 200"
          stroke-dashoffset="-50"
          stroke-linecap="round"
          transform="rotate(-90 40 40)"/>
  
  <!-- Center dot indicator -->
  <circle cx="40" cy="40" r="4" fill="#4CAF50"/>
</svg>
