# Mosquitto broker config for the docker-compose demo orchestration.
#
# Minimal listener setup: plain MQTT on 1883, no auth, no TLS. Suitable
# for a self-contained demo running entirely on the operator's laptop.
# A production deployment would add `password_file`, TLS via
# `cafile` / `certfile` / `keyfile`, and ACLs -- out of scope for the
# demo image.

listener 1883 0.0.0.0
allow_anonymous true

# Persist subscriptions / retained messages on a tmpfs-style volume so
# the broker survives a `docker compose restart` without dropping
# state. The compose file mounts a named volume here.
persistence true
persistence_location /mosquitto/data/

# Send mosquitto's logs to stdout so `docker compose logs mosquitto`
# shows them inline alongside the other services.
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
