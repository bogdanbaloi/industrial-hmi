name: Industrial HMI - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-ubuntu:
    name: Build (Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build \
          libgtkmm-4.0-dev libsqlite3-dev libboost-dev \
          libgtest-dev libgmock-dev

    - name: Configure
      run: cmake --preset release -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build/release -- -j$(nproc)

    - name: Test
      working-directory: build/release
      run: ctest --output-on-failure --no-tests=error

    - name: Verify
      run: test -f build/release/industrial-hmi

    - name: Package
      run: |
        mkdir -p dist
        cp build/release/industrial-hmi dist/
        cp -r build/release/ui dist/
        cp -r build/release/config dist/
        cp -r build/release/assets dist/ 2>/dev/null || true
        tar -czf industrial-hmi-linux.tar.gz -C dist .

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: industrial-hmi-linux-${{ github.sha }}
        path: industrial-hmi-linux.tar.gz
        retention-days: 30

  build-windows:
    name: Build (Windows MSYS2)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          mingw-w64-clang-x86_64-toolchain
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja
          mingw-w64-clang-x86_64-gtkmm-4.0
          mingw-w64-clang-x86_64-sqlite3
          mingw-w64-clang-x86_64-boost
          mingw-w64-clang-x86_64-gtest

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure
      run: cmake --preset windows-msys2-release -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build/release

    - name: Test
      working-directory: build/release
      run: ctest --output-on-failure --no-tests=error

    - name: Verify
      run: test -f build/release/industrial-hmi.exe

  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build cppcheck \
          libgtkmm-4.0-dev libsqlite3-dev libboost-dev

    - name: Run cppcheck
      run: |
        cppcheck \
          --enable=warning,style,performance \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --error-exitcode=0 \
          --inline-suppr \
          src/

  documentation:
    name: Documentation
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Verify
      run: |
        test -f README.md
        test -f BUILD.md
        test -f LICENSE

    - name: Stats
      run: |
        echo "## Project Statistics" >> $GITHUB_STEP_SUMMARY
        echo "- C++ files: $(find src -name '*.cpp' -o -name '*.h' | wc -l)" >> $GITHUB_STEP_SUMMARY
        echo "- Lines of code: $(find src -name '*.cpp' -o -name '*.h' -exec cat {} \; | wc -l)" >> $GITHUB_STEP_SUMMARY
        echo "- Commits: $(git rev-list --count HEAD)" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-24.04
    needs: [build-ubuntu, build-windows, code-quality, documentation]
    if: always()

    steps:
    - name: Summary
      run: |
        echo "## CI/CD Results" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Build Ubuntu | ${{ needs.build-ubuntu.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build Windows | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Documentation | ${{ needs.documentation.result }} |" >> $GITHUB_STEP_SUMMARY
