name: Industrial HMI - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-ubuntu:
    name: Build (Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build \
          libgtkmm-4.0-dev libsqlite3-dev libboost-dev

    - name: Configure
      run: cmake --preset release

    - name: Build
      run: cmake --build build/release -- -j$(nproc)

    - name: Verify
      run: test -f build/release/industrial-hmi

    - name: Package
      run: |
        mkdir -p dist
        cp build/release/industrial-hmi dist/
        cp -r build/release/ui dist/
        cp -r build/release/config dist/
        cp -r build/release/assets dist/ 2>/dev/null || true
        tar -czf industrial-hmi-linux.tar.gz -C dist .

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: industrial-hmi-linux-${{ github.sha }}
        path: industrial-hmi-linux.tar.gz
        retention-days: 30

  build-windows:
    name: Build (Windows / vcpkg)
    runs-on: windows-2022

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Enable vcpkg binary caching
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b33e4f286a55ef6'

    - name: Install Dependencies
      run: vcpkg install gtkmm sqlite3 boost-signals2 boost-asio

    - name: Configure
      run: |
        cmake -B build `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}}

  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build cppcheck \
          libgtkmm-4.0-dev libsqlite3-dev libboost-dev

    - name: Run cppcheck
      run: |
        cppcheck \
          --enable=warning,style,performance \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --error-exitcode=0 \
          --inline-suppr \
          src/

  documentation:
    name: Documentation
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Verify
      run: |
        test -f README.md
        test -f BUILD.md
        test -f LICENSE

    - name: Stats
      run: |
        echo "## Project Statistics" >> $GITHUB_STEP_SUMMARY
        echo "- C++ files: $(find src -name '*.cpp' -o -name '*.h' | wc -l)" >> $GITHUB_STEP_SUMMARY
        echo "- Lines of code: $(find src -name '*.cpp' -o -name '*.h' -exec cat {} \; | wc -l)" >> $GITHUB_STEP_SUMMARY
        echo "- Commits: $(git rev-list --count HEAD)" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-24.04
    needs: [build-ubuntu, build-windows, code-quality, documentation]
    if: always()

    steps:
    - name: Summary
      run: |
        echo "## CI/CD Results" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Build Ubuntu | ${{ needs.build-ubuntu.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build Windows | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Documentation | ${{ needs.documentation.result }} |" >> $GITHUB_STEP_SUMMARY
