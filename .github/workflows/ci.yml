name: Industrial HMI - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-ubuntu:
    name: Build (Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build \
          libgtkmm-4.0-dev libsqlite3-dev libboost-dev \
          libgtest-dev libgmock-dev \
          xvfb

    - name: Configure
      run: cmake --preset release -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build/release -- -j$(nproc)

    - name: Test
      working-directory: build/release
      run: xvfb-run ctest --output-on-failure --no-tests=error

    - name: Verify
      run: test -f build/release/industrial-hmi

    - name: Package
      run: |
        mkdir -p dist
        cp build/release/industrial-hmi dist/
        cp -r build/release/assets dist/
        cp -r build/release/config dist/
        tar -czf industrial-hmi-linux.tar.gz -C dist .

    - name: Upload
      uses: actions/upload-artifact@v5
      with:
        name: industrial-hmi-linux-${{ github.sha }}
        path: industrial-hmi-linux.tar.gz
        retention-days: 30

  build-windows:
    name: Build (Windows MSYS2)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          mingw-w64-clang-x86_64-toolchain
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja
          mingw-w64-clang-x86_64-gtkmm-4.0
          mingw-w64-clang-x86_64-sqlite3
          mingw-w64-clang-x86_64-boost
          mingw-w64-clang-x86_64-gtest

    - name: Checkout
      uses: actions/checkout@v5

    - name: Configure
      run: cmake --preset windows-msys2-release -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build/release

    - name: Test
      working-directory: build/release
      run: ctest --output-on-failure --no-tests=error

    - name: Verify
      run: test -f build/release/industrial-hmi.exe

  code-quality:
    name: Code Quality
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build cppcheck \
          libgtkmm-4.0-dev libsqlite3-dev libboost-dev

    - name: Run cppcheck
      run: |
        cppcheck \
          --enable=warning,style,performance \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --error-exitcode=0 \
          --inline-suppr \
          src/

  clang-tidy:
    name: Clang-Tidy
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build \
          libgtkmm-4.0-dev libsqlite3-dev libboost-dev \
          libgtest-dev libgmock-dev \
          clang-tidy

    # Configure only — we don't need a full build, just the
    # compile_commands.json database so clang-tidy can resolve includes.
    - name: Configure (generate compile_commands.json)
      run: |
        cmake -S . -B build/tidy -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_TESTS=ON \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run clang-tidy on src/
      run: |
        # -quiet suppresses the progress lines so only diagnostics remain.
        # -header-filter restricts warnings to our headers (ignores gtkmm etc.).
        find src -name '*.cpp' -print0 | \
          xargs -0 clang-tidy \
            -p build/tidy \
            -quiet \
            -header-filter='src/.*' \
            2>&1 | tee clang-tidy-report.txt

        # Fail the job if any warning/error was produced
        if grep -qE '^\S+:[0-9]+:[0-9]+: (warning|error):' clang-tidy-report.txt; then
          echo "::error::clang-tidy reported issues — see report above"
          exit 1
        fi

    - name: Upload report as artifact
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: clang-tidy-report-${{ github.sha }}
        path: clang-tidy-report.txt
        retention-days: 30

  coverage:
    name: Test Coverage
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build \
          libgtkmm-4.0-dev libsqlite3-dev libboost-dev \
          libgtest-dev libgmock-dev \
          gcovr xvfb

    # Debug + ENABLE_COVERAGE adds --coverage / -fprofile-arcs / -ftest-coverage
    # to the existing compile and link options. Sanitizers are deliberately
    # left OFF here - their instrumentation overlaps with gcov's and can
    # distort line-hit counts.
    - name: Configure
      run: |
        cmake -S . -B build/coverage -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_TESTS=ON \
          -DENABLE_COVERAGE=ON \
          -DENABLE_SANITIZERS=OFF

    - name: Build
      run: cmake --build build/coverage -- -j$(nproc)

    - name: Run tests
      working-directory: build/coverage
      run: xvfb-run ctest --output-on-failure --no-tests=error

    # Boot the real GTK binary once under Xvfb so the MainWindow /
    # SettingsPage / DialogManager / AlertsPanel / LiveClock /
    # SystemStatusBadge / ThemeManager / *Gauge / *Chart constructors
    # get hit at least once. We have no unit test that composes the
    # full window, so without this smoke run those files stay at 0%
    # coverage even though Xvfb is already available for ctest.
    #
    # HMI_EXIT_AFTER_MS is honoured by Application::run: it arms a
    # one-shot Glib timer that calls gtkApp->quit() cleanly. Using
    # `timeout` + SIGTERM would skip the gcov atexit handler and leave
    # every .gcda file empty, which defeats the purpose.
    - name: Boot GTK binary for coverage (Xvfb smoke)
      working-directory: build/coverage
      env:
        HMI_EXIT_AFTER_MS: "3000"
      run: xvfb-run -a ./industrial-hmi || true

    # Generate report from the .gcda files dropped by the test runs.
    # --filter src/ keeps third-party headers (gtest, gtkmm, boost) and the
    # tests/ directory itself out of the percentages.
    - name: Generate coverage report
      run: |
        mkdir -p coverage
        gcovr \
          --root . \
          --filter 'src/' \
          --exclude '.*ModelContext\.h' \
          --html-details coverage/index.html \
          --xml coverage/coverage.xml \
          --txt coverage/summary.txt \
          --print-summary \
          build/coverage

    # Surface the totals at the top of the GitHub Actions run page so the
    # number is visible without downloading the artifact.
    - name: Post coverage summary
      run: |
        echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat coverage/summary.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Upload HTML report
      uses: actions/upload-artifact@v5
      with:
        name: coverage-html-${{ github.sha }}
        path: coverage/
        retention-days: 30

  documentation:
    name: Documentation
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Verify
      run: |
        test -f README.md
        test -f BUILD.md
        test -f LICENSE

    - name: Stats
      run: |
        echo "## Project Statistics" >> $GITHUB_STEP_SUMMARY
        echo "- C++ files: $(find src -name '*.cpp' -o -name '*.h' | wc -l)" >> $GITHUB_STEP_SUMMARY
        echo "- Lines of code: $(find src -name '*.cpp' -o -name '*.h' -exec cat {} \; | wc -l)" >> $GITHUB_STEP_SUMMARY
        echo "- Commits: $(git rev-list --count HEAD)" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-24.04
    needs: [build-ubuntu, build-windows, code-quality, clang-tidy, coverage, documentation]
    if: always()

    steps:
    - name: Summary
      run: |
        echo "## CI/CD Results" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Build Ubuntu | ${{ needs.build-ubuntu.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build Windows | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Clang-Tidy | ${{ needs.clang-tidy.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Documentation | ${{ needs.documentation.result }} |" >> $GITHUB_STEP_SUMMARY
